name: 占い配信（WP早朝公開＋SNS6:00・分離版）

# 【設計 2026-06-13】WP公開とSNS投稿を分離（Xの6時投稿前に記事を確実公開するため）
#  - WP公開（--wp-only・SNS無し）を早朝に複数回リトライ（04:30/05:00/05:30 JST）
#    → SNSを含まないので何度リトライしても二重投稿にならない＝確実に6時前公開
#  - SNS投稿（--sns-only）は 06:00 JST に1回だけ。早朝ジョブが保存した bridge を
#    GHAキャッシュ経由で受け取り、Claude API再呼び出しなし（¥0）でSNSへ
#  - 手動 workflow_dispatch は従来どおりフル（--publish）で復旧可能

on:
  schedule:
    - cron: '30 18 * * *'  # 03:30 JST  WP公開（最速・cron不発対策で前倒し追加 2026-06-16）
    - cron: '0 19 * * *'   # 04:00 JST  WP公開リトライ
    - cron: '30 19 * * *'  # 04:30 JST  WP公開リトライ
    - cron: '0 20 * * *'   # 05:00 JST  WP公開リトライ
    - cron: '30 20 * * *'  # 05:30 JST  WP公開リトライ
    - cron: '45 20 * * *'  # 05:45 JST  WP公開リトライ（最終・06:00前にbridge確実化）
    - cron: '0 21 * * *'   # 06:00 JST  SNS投稿（X除く・Threads/IG/Reels）
    - cron: '30 21 * * *'  # 06:30 JST  SNS自動リトライ（既投稿はマーカーでスキップ＝二重投稿なし）
    - cron: '0 22 * * *'   # 07:00 JST  SNS自動リトライ
    - cron: '0 23 * * *'   # 08:00 JST  SNS自動リトライ（最終保険）
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日 YYYY-MM-DD（空ならJSTの今日）'
        required: false
      mode:
        description: '実行モード（publish=フル復旧 / dry-run=テスト）'
        type: choice
        options:
          - publish
          - dry-run
        default: 'publish'

permissions:
  contents: read

jobs:
  uranai:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: uranai/scripts
    steps:
      - uses: actions/checkout@v4

      - name: 対象日（JST）を確定
        id: d
        run: echo "ymd=$(TZ=Asia/Tokyo date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: uranai/scripts/requirements.txt

      - name: 日本語フォントセットアップ（GitHub直接DL方式）
        run: |
          SAFE_FONT_DIR=/tmp/uranai_fonts
          mkdir -p "$SAFE_FONT_DIR"
          BASE_URL="https://github.com/notofonts/noto-cjk/raw/main/Sans/OTC"
          curl -fsSL --retry 3 --max-time 180 -o "$SAFE_FONT_DIR/NotoSansCJK-Bold.ttc" "$BASE_URL/NotoSansCJK-Bold.ttc"
          curl -fsSL --retry 3 --max-time 180 -o "$SAFE_FONT_DIR/NotoSansCJK-Regular.ttc" "$BASE_URL/NotoSansCJK-Regular.ttc"
          cp "$SAFE_FONT_DIR/NotoSansCJK-Bold.ttc" "$SAFE_FONT_DIR/NotoSansCJK-Black.ttc"
          cp "$SAFE_FONT_DIR/NotoSansCJK-Regular.ttc" "$SAFE_FONT_DIR/NotoSansCJK-Medium.ttc"
          ls -la "$SAFE_FONT_DIR"/NotoSansCJK-*
          echo "URANAI_FONT_DIR=$SAFE_FONT_DIR" >> $GITHUB_ENV

      - name: ffmpeg 確認（プリインストール優先）
        run: |
          if command -v ffmpeg >/dev/null 2>&1; then
            echo "ffmpeg プリインストール済み: $(ffmpeg -version | head -1)"
          else
            sudo apt-get update && sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version | head -1

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      # bridge（早朝WP公開ジョブが保存した生成データ）を復元
      #  - WPリトライ：前の成功ジョブの bridge を受け取り skip-if-published 判定に使う
      #  - 06:00 SNSジョブ：早朝ジョブの bridge を受け取って SNS投稿に使う（再生成・再課金なし）
      - name: bridge キャッシュ復元
        uses: actions/cache/restore@v4
        with:
          path: uranai/output/bridge_${{ steps.d.outputs.ymd }}.json
          key: uranai-bridge-${{ steps.d.outputs.ymd }}-${{ github.run_id }}
          restore-keys: |
            uranai-bridge-${{ steps.d.outputs.ymd }}-

      # SNS既投稿マーカー（どの媒体まで投稿済みか）を前のリトライから引き継ぐ
      #  restore-keys のプレフィックス一致で「その日の最新マーカー」を取得
      - name: SNS既投稿マーカー復元
        uses: actions/cache/restore@v4
        with:
          path: uranai/output/sns_done_${{ steps.d.outputs.ymd }}.json
          key: uranai-snsdone-${{ steps.d.outputs.ymd }}-${{ github.run_id }}
          restore-keys: |
            uranai-snsdone-${{ steps.d.outputs.ymd }}-

      - name: 占い配信実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          SNS_LOG_WEBHOOK_URL: ${{ secrets.SNS_LOG_WEBHOOK_URL }}
          SNS_LOG_SECRET: ${{ secrets.SNS_LOG_SECRET }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          URANAI_SHEETS_URL: ${{ secrets.URANAI_SHEETS_URL }}
          URANAI_SHEETS_SECRET: ${{ secrets.URANAI_SHEETS_SECRET }}
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.target_date }}"
          fi
          SCHED="${{ github.event.schedule }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "$SCHED" in
              "0 21 * * *"|"30 21 * * *"|"0 22 * * *"|"0 23 * * *")
                FLAGS="--sns-only" ;;                          # 06:00〜08:00 SNS投稿（リトライ・既投稿はマーカーでスキップ）
              *)
                FLAGS="--publish --wp-only --skip-if-published" ;;  # 早朝 WP公開のみ（リトライ安全）
            esac
          elif [ "${{ github.event.inputs.mode }}" = "publish" ]; then
            FLAGS="--publish"                                  # 手動フル復旧（WP+SNS一括）
          else
            FLAGS="--dry --skip-wp"                            # 手動テスト
          fi
          echo "実行コマンド: python main.py $DATE_ARG $FLAGS"
          python main.py $DATE_ARG $FLAGS

      # 早朝WP公開ジョブが作った bridge を保存（06:00 SNSジョブが受け取る）
      #  - SNSを含む 06:00 / 手動 では保存しない（bridge無し・SNSは直に投稿済）
      #  - continue-on-error: bridge未生成(WP失敗) や key既存(リトライ) でも落とさない
      - name: bridge キャッシュ保存
        if: github.event_name == 'schedule' && (github.event.schedule == '30 18 * * *' || github.event.schedule == '0 19 * * *' || github.event.schedule == '30 19 * * *' || github.event.schedule == '0 20 * * *' || github.event.schedule == '30 20 * * *' || github.event.schedule == '45 20 * * *')
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: uranai/output/bridge_${{ steps.d.outputs.ymd }}.json
          key: uranai-bridge-${{ steps.d.outputs.ymd }}-${{ github.run_id }}

      # SNS投稿後、どこまで投稿できたかのマーカーを保存（次のリトライが二重投稿を避けるため）
      #  SNSジョブ(06:00〜08:00)＋手動publish で保存。always()で部分成功も必ず残す。run_id込みで毎回新キー
      - name: SNS既投稿マーカー保存
        if: always() && ( (github.event_name == 'schedule' && (github.event.schedule == '0 21 * * *' || github.event.schedule == '30 21 * * *' || github.event.schedule == '0 22 * * *' || github.event.schedule == '0 23 * * *')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'publish') )
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: uranai/output/sns_done_${{ steps.d.outputs.ymd }}.json
          key: uranai-snsdone-${{ steps.d.outputs.ymd }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: 動画アーティファクトをアップロード（dry-run時のみ）
        if: github.event.inputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: reel-preview-${{ github.event.inputs.target_date || 'today' }}
          path: |
            uranai/output/*_reel.mp4
            uranai/output/*_wp.png
            uranai/output/*_ig.png
            uranai/output/*_caption_*.txt
          retention-days: 7
          if-no-files-found: warn

      - name: 失敗通知（Gmail）
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import os, smtplib
          from email.mime.text import MIMEText
          msg = MIMEText('占い配信ワークフローが失敗しました。GitHub Actions のログを確認してください。\n\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}', 'plain', 'utf-8')
          msg['Subject'] = '[豊川ガイド] 占い配信失敗'
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = os.environ['GMAIL_USER']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          "
