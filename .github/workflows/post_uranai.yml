name: 占い配信（毎朝6時 JST）

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日 06:00 JST（UTC 21:00 前日）
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日 YYYY-MM-DD（空ならJSTの今日）'
        required: false
      mode:
        description: '実行モード'
        type: choice
        options:
          - publish
          - dry-run
        default: 'dry-run'

jobs:
  uranai:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: uranai/scripts
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: uranai/scripts/requirements.txt

      - name: 日本語フォントインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: 占い配信実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          SNS_LOG_WEBHOOK_URL: ${{ secrets.SNS_LOG_WEBHOOK_URL }}
          SNS_LOG_SECRET: ${{ secrets.SNS_LOG_SECRET }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          URANAI_FONT_DIR: /usr/share/fonts/opentype/noto
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.target_date }}"
          fi
          MODE_FLAGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MODE_FLAGS="--publish"
          elif [ "${{ github.event.inputs.mode }}" = "publish" ]; then
            MODE_FLAGS="--publish"
          else
            MODE_FLAGS="--dry --skip-wp"
          fi
          echo "実行コマンド: python main.py $DATE_ARG $MODE_FLAGS"
          python main.py $DATE_ARG $MODE_FLAGS

      - name: 失敗通知（Gmail）
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import os, smtplib
          from email.mime.text import MIMEText
          msg = MIMEText('占い配信ワークフローが失敗しました。GitHub Actions のログを確認してください。\n\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}', 'plain', 'utf-8')
          msg['Subject'] = '[豊川ガイド] 占い配信失敗'
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = os.environ['GMAIL_USER']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          "
