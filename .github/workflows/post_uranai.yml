name: 占い配信（毎朝6時 JST）

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日 06:00 JST（UTC 21:00 前日）
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日 YYYY-MM-DD（空ならJSTの今日）'
        required: false
      mode:
        description: '実行モード（テスト時のみ dry-run に変更）'
        type: choice
        options:
          - publish
          - dry-run
        default: 'publish'

jobs:
  uranai:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Reels動画のIG側処理待ち（最大3分ポーリング）に余裕を持たせる
    defaults:
      run:
        working-directory: uranai/scripts
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: uranai/scripts/requirements.txt

      - name: 日本語フォントインストール（軽量版）
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          # 実ファイルパスを動的検出（Ubuntu バージョンでパス違いに対応）
          BOLD=$(find /usr/share/fonts -name "NotoSansCJK-Bold*" 2>/dev/null | head -1)
          REGULAR=$(find /usr/share/fonts -name "NotoSansCJK-Regular*" 2>/dev/null | head -1)
          if [ -z "$BOLD" ] || [ -z "$REGULAR" ]; then
            echo "::error::NotoSansCJK フォントが見つかりません"
            echo "fonts-noto-cjk パッケージのファイル一覧:"
            dpkg -L fonts-noto-cjk | grep -i "\.ttc\|\.otf" | head -20
            exit 1
          fi
          FONT_DIR=$(dirname "$BOLD")
          echo "検出した FONT_DIR: $FONT_DIR"
          # コードが要求する Black/Medium をシンボリックリンクで代用
          sudo ln -sf "$BOLD" "$FONT_DIR/NotoSansCJK-Black.ttc"
          sudo ln -sf "$REGULAR" "$FONT_DIR/NotoSansCJK-Medium.ttc"
          ls -la "$FONT_DIR"/NotoSansCJK-*
          # 後続ステップに動的パスを引き継ぐ
          echo "URANAI_FONT_DIR=$FONT_DIR" >> $GITHUB_ENV

      - name: ffmpeg セットアップ（事前ビルド済みバイナリ）
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: 占い配信実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          SNS_LOG_WEBHOOK_URL: ${{ secrets.SNS_LOG_WEBHOOK_URL }}
          SNS_LOG_SECRET: ${{ secrets.SNS_LOG_SECRET }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # URANAI_FONT_DIR は前ステップで $GITHUB_ENV に動的に設定済み
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.target_date }}"
          fi
          MODE_FLAGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MODE_FLAGS="--publish"
          elif [ "${{ github.event.inputs.mode }}" = "publish" ]; then
            MODE_FLAGS="--publish"
          else
            MODE_FLAGS="--dry --skip-wp"
          fi
          echo "実行コマンド: python main.py $DATE_ARG $MODE_FLAGS"
          python main.py $DATE_ARG $MODE_FLAGS

      - name: 失敗通知（Gmail）
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import os, smtplib
          from email.mime.text import MIMEText
          msg = MIMEText('占い配信ワークフローが失敗しました。GitHub Actions のログを確認してください。\n\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}', 'plain', 'utf-8')
          msg['Subject'] = '[豊川ガイド] 占い配信失敗'
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = os.environ['GMAIL_USER']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          "
