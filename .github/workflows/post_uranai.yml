name: 占い配信（毎朝6時 JST・05:00発火で遅延吸収）

on:
  schedule:
    - cron: '0 20 * * *'  # 毎日 05:00 JST（UTC 20:00 前日）本配信・GHA遅延吸収版（実態は5:00〜6:30に動く）
    # 🚨 2026-05-24 一時停止：5/24 配信で IG/Threads 二重投稿が発生したため保険cronを無効化
    # check_already_published() は WP のみチェックする設計で、IG/Threads の重複は防げない
    # 原因特定後に復活させる
    # - cron: '0 0 * * *'   # 保険 09:00 JST（UTC 0:00）失敗自動救済・既公開ならスキップ
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日 YYYY-MM-DD（空ならJSTの今日）'
        required: false
      mode:
        description: '実行モード（テスト時のみ dry-run に変更）'
        type: choice
        options:
          - publish
          - dry-run
        default: 'publish'

permissions:
  contents: read
  actions: write   # post_light_article.yml を dispatch するため必要

jobs:
  uranai:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Reels動画のIG側処理待ち（最大5分ポーリング×3回リトライ=18分）に余裕を持たせる
    defaults:
      run:
        working-directory: uranai/scripts
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: uranai/scripts/requirements.txt

      - name: 日本語フォントセットアップ（GitHub直接DL方式・apt-get廃止）
        run: |
          # apt-get fonts-noto-cjk は Azure Ubuntu Mirror 経由で61.2MBを取得するが
          # 数分かかることがあるため、GitHub Raw 経由で直接DLに変更（数十秒で完了）
          SAFE_FONT_DIR=/tmp/uranai_fonts
          mkdir -p "$SAFE_FONT_DIR"
          BASE_URL="https://github.com/notofonts/noto-cjk/raw/main/Sans/OTC"
          echo "フォント直接DL: $BASE_URL"
          curl -fsSL --retry 3 --max-time 180 \
            -o "$SAFE_FONT_DIR/NotoSansCJK-Bold.ttc" \
            "$BASE_URL/NotoSansCJK-Bold.ttc"
          curl -fsSL --retry 3 --max-time 180 \
            -o "$SAFE_FONT_DIR/NotoSansCJK-Regular.ttc" \
            "$BASE_URL/NotoSansCJK-Regular.ttc"
          # コードが要求する Black/Medium も同じファイルで代用
          cp "$SAFE_FONT_DIR/NotoSansCJK-Bold.ttc" "$SAFE_FONT_DIR/NotoSansCJK-Black.ttc"
          cp "$SAFE_FONT_DIR/NotoSansCJK-Regular.ttc" "$SAFE_FONT_DIR/NotoSansCJK-Medium.ttc"
          # サイズ確認（途中切れ等を検出）
          ls -la "$SAFE_FONT_DIR"/NotoSansCJK-*
          # 後続ステップに固定パスを引き継ぐ
          echo "URANAI_FONT_DIR=$SAFE_FONT_DIR" >> $GITHUB_ENV

      - name: ffmpeg 確認（プリインストール優先・apt-getフォールバック）
        run: |
          # FedericoCarboni/setup-ffmpeg@v3 は外部サイト(johnvansickle)依存で
          # "Failed to get latest johnvansickle ffmpeg release" で落ちる事故あり(2026-05-18 #48)。
          # ubuntu-latest は ffmpeg プリインストール済みなので外部依存を排除。
          if command -v ffmpeg >/dev/null 2>&1; then
            echo "ffmpeg プリインストール済み: $(ffmpeg -version | head -1)"
          else
            echo "ffmpeg 未検出 → apt-get で導入"
            sudo apt-get update && sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version | head -1

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: 占い配信実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          SNS_LOG_WEBHOOK_URL: ${{ secrets.SNS_LOG_WEBHOOK_URL }}
          SNS_LOG_SECRET: ${{ secrets.SNS_LOG_SECRET }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          URANAI_SHEETS_URL: ${{ secrets.URANAI_SHEETS_URL }}
          URANAI_SHEETS_SECRET: ${{ secrets.URANAI_SHEETS_SECRET }}
          # URANAI_FONT_DIR は前ステップで $GITHUB_ENV に動的に設定済み
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.target_date }}"
          fi
          MODE_FLAGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MODE_FLAGS="--publish"
            # 09:00 JST 保険cron は「既に公開済みなら何もしない」を付与（二重投稿防止）
            if [ "${{ github.event.schedule }}" = "0 0 * * *" ]; then
              MODE_FLAGS="--publish --skip-if-published"
            fi
          elif [ "${{ github.event.inputs.mode }}" = "publish" ]; then
            MODE_FLAGS="--publish"
          else
            MODE_FLAGS="--dry --skip-wp"
          fi
          echo "実行コマンド: python main.py $DATE_ARG $MODE_FLAGS"
          python main.py $DATE_ARG $MODE_FLAGS

      - name: 動画アーティファクトをアップロード（dry-run時のみ）
        if: github.event.inputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: reel-preview-${{ github.event.inputs.target_date || 'today' }}
          path: |
            uranai/output/*_reel.mp4
            uranai/output/*_wp.png
            uranai/output/*_ig.png
            uranai/output/*_caption_*.txt
          retention-days: 7
          if-no-files-found: warn

      - name: 失敗通知（Gmail）
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import os, smtplib
          from email.mime.text import MIMEText
          msg = MIMEText('占い配信ワークフローが失敗しました。GitHub Actions のログを確認してください。\n\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}', 'plain', 'utf-8')
          msg['Subject'] = '[豊川ガイド] 占い配信失敗'
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = os.environ['GMAIL_USER']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          "

      # ─────────────────────────────────────
      # ライト記事 WP予約投稿（朝5時 cron で確実実行）
      # ─────────────────────────────────────
      # 2026-06-01 設計：占いの cron（朝5時・99%安定）を使ってライト記事の WP予約投稿だけ作成。
      # WP 内部の予約投稿機能（status=future）で 19:00 に自動 publish される。
      # SNS は別途 post_light_article.yml の cron（19/19:30/20/22時）で投稿。
      #
      # メリット：
      # - 19:00 cron が不発でも WP記事は確実に19時公開（WP内部cronで動く）
      # - 朝公開バグは再発しない（status=future なので朝5時にpublishされない）
      # - SNS失敗時は WP記事だけ公開・後で社長手動 SNS でリカバー可能
      # 🚨 2026-06-02 朝公開バグ再発（IG/Threadsに朝5時頃公開された）→ 全step 緊急無効化
      # 根本原因 調査中（GHAログ確認＋wp-only モードのSNSスキップが効いてない理由）
      # 19時の post_light_article.yml cron で当日記事は publish モードで投稿される（朝5時 wp-only に依存しない）
      # 原因特定＆修正後に再開する
      - name: ライト記事 セットアップ
        if: false  # 🚨 朝公開バグ再発で緊急無効化（2026-06-02）
        working-directory: light_articles/scripts
        run: |
          pip install -r requirements.txt
          echo "${{ secrets.LIGHT_GOOGLE_CREDENTIALS_B64 }}" | base64 -d > credentials.json
          mkdir -p _assets
          echo "${{ secrets.LIGHT_GOOGLE_TOKEN_B64 }}" | base64 -d > _assets/sheets_token.json

      - name: ライト記事 ffmpeg（Reel生成に必要）
        if: false  # 🚨 朝公開バグ再発で緊急無効化（2026-06-02）
        run: |
          if command -v ffmpeg > /dev/null; then
            echo "ffmpeg プリインストール済み"
          else
            sudo apt-get update && sudo apt-get install -y ffmpeg
          fi

      - name: ライト記事 日本語フォント
        if: false  # 🚨 朝公開バグ再発で緊急無効化（2026-06-02）
        run: |
          FONT_DIR=/tmp/light_fonts
          mkdir -p "$FONT_DIR"
          BASE_URL="https://github.com/notofonts/noto-cjk/raw/main/Sans/OTC"
          curl -fsSL --retry 3 --max-time 180 -o "$FONT_DIR/NotoSansCJK-Bold.ttc" "$BASE_URL/NotoSansCJK-Bold.ttc"
          curl -fsSL --retry 3 --max-time 180 -o "$FONT_DIR/NotoSansCJK-Regular.ttc" "$BASE_URL/NotoSansCJK-Regular.ttc"
          echo "LIGHT_FONT_DIR=$FONT_DIR" >> $GITHUB_ENV

      - name: ライト記事 WP予約投稿（SNSスキップ）
        if: false  # 🚨 朝公開バグ再発で緊急無効化（2026-06-02）・19時 post_light_article.yml で当日記事はpublishされる
        working-directory: light_articles/scripts
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          PYTHONIOENCODING: utf-8
        run: |
          echo "▶ ライト記事 WP予約投稿（朝5時・占い cron 内で実行）"
          python publish_light_article.py --wp-only || echo "⚠ ライト記事 WP予約投稿失敗"
