name: さくっとPR配信（毎朝10時 JST・PRキューに該当ある時のみ実行）

on:
  schedule:
    # 朝のUTC 01時台は夜(UTC10時台)より遅延が少ない。3段retryで確実に。
    # 二重発火しても publish_pr_article.py の skip-if-published で安全。
    - cron: '0 1 * * *'    # 10:00 JST
    - cron: '30 1 * * *'   # 10:30 JST（保険）
    - cron: '0 3 * * *'    # 12:00 JST（最終保険）
  workflow_dispatch:
    inputs:
      pr_id:
        description: '対象ID（例: PR001・空ならPRキューの公開希望日=今日を自動選択）'
        required: false
      mode:
        description: '実行モード'
        type: choice
        options:
          - publish
          - draft
          - dry-run
        default: 'publish'

jobs:
  pr_article:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: light_articles/scripts
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: light_articles/scripts/requirements.txt

      - name: 日本語フォントセットアップ（GitHub Raw 直接DL）
        run: |
          FONT_DIR=/tmp/light_fonts
          mkdir -p "$FONT_DIR"
          BASE_URL="https://github.com/notofonts/noto-cjk/raw/main/Sans/OTC"
          curl -fsSL --retry 3 --max-time 180 \
            -o "$FONT_DIR/NotoSansCJK-Bold.ttc" \
            "$BASE_URL/NotoSansCJK-Bold.ttc"
          curl -fsSL --retry 3 --max-time 180 \
            -o "$FONT_DIR/NotoSansCJK-Regular.ttc" \
            "$BASE_URL/NotoSansCJK-Regular.ttc"
          echo "LIGHT_FONT_DIR=$FONT_DIR" >> $GITHUB_ENV

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: OAuth credentials 復元
        run: |
          echo "${{ secrets.LIGHT_GOOGLE_CREDENTIALS_B64 }}" | base64 -d > credentials.json
          mkdir -p _assets
          echo "${{ secrets.LIGHT_GOOGLE_TOKEN_B64 }}" | base64 -d > _assets/sheets_token.json

      - name: さくっとPR配信実行
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PYTHONIOENCODING: utf-8
        run: |
          ID_ARG=""
          if [ -n "${{ github.event.inputs.pr_id }}" ]; then
            ID_ARG="--id ${{ github.event.inputs.pr_id }}"
          fi
          MODE_FLAGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MODE_FLAGS="--publish"
          elif [ "${{ github.event.inputs.mode }}" = "publish" ]; then
            MODE_FLAGS="--publish"
          elif [ "${{ github.event.inputs.mode }}" = "draft" ]; then
            MODE_FLAGS="--draft"
          fi
          echo "実行コマンド: python publish_pr_article.py $ID_ARG $MODE_FLAGS"
          python publish_pr_article.py $ID_ARG $MODE_FLAGS

      - name: 生成物アーティファクト（dry-run/draft時のみ）
        if: github.event.inputs.mode == 'dry-run' || github.event.inputs.mode == 'draft'
        uses: actions/upload-artifact@v4
        with:
          name: pr-article-preview-${{ github.run_id }}
          path: light_articles/scripts/_sample/*.png
          retention-days: 7
          if-no-files-found: warn

      - name: 失敗通知（Gmail）
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import os, smtplib
          from email.mime.text import MIMEText
          msg = MIMEText('さくっとPR配信ワークフローが失敗しました。GitHub Actions のログを確認してください。\n\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}', 'plain', 'utf-8')
          msg['Subject'] = '[豊川ガイド] さくっとPR配信失敗'
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = os.environ['GMAIL_USER']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          "
