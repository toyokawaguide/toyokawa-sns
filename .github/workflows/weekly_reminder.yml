name: 週次リマインダー（占い）

on:
  schedule:
    - cron: '0 12 * * 6'  # 毎週土曜 21:00 JST（UTC 土曜 12:00）
  workflow_dispatch:

jobs:
  reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: uranai/scripts
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: uranai/scripts/requirements.txt

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: 週次リマインダー実行
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python weekly_reminder.py
