name: ライト記事配信（毎日19時 JST・公開希望日に該当ある時のみ実行）

on:
  schedule:
    # 2026-06-05 改修：配信トリガーを Cloudflare Workers Cron に一本化（19:00 JST・正確）。
    # 理由：GHA schedule cron は夜の混雑時間帯（UTC 10時台）で遅延・多重発火し、
    #       6/5 に同一記事が4回SNS投稿される重複事故が発生した。
    # → 主トリガーは Cloudflare（workflow_dispatch で発火）。
    #   ここの schedule は「Cloudflareが万一止まった時」の保険1個だけ残す（20:30 JST）。
    #   重複は publish_light_article.py が「投稿済」状態で skip するので二重発火しても安全。
    - cron: '30 11 * * *'  # 毎日 20:30 JST（UTC 11:30）保険のみ・Cloudflare失敗時の救済
  workflow_dispatch:
    inputs:
      target_id:
        description: '対象記事ID（例: LR001・空ならSheetsの公開希望日=今日を自動選択）'
        required: false
      mode:
        description: '実行モード（publish=本番投稿 / publish-skip-if-published=WP既存ならSNSだけ救済 / draft / dry-run）'
        type: choice
        options:
          - publish
          - publish-skip-if-published
          - draft
          - dry-run
        default: 'publish'

jobs:
  light_article:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Reels動画のIG側処理待ち（最大5分ポーリング×3回=18分）に余裕
    defaults:
      run:
        working-directory: light_articles/scripts
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: light_articles/scripts/requirements.txt

      - name: 日本語フォントセットアップ（GitHub Raw 直接DL）
        run: |
          FONT_DIR=/tmp/light_fonts
          mkdir -p "$FONT_DIR"
          BASE_URL="https://github.com/notofonts/noto-cjk/raw/main/Sans/OTC"
          echo "フォント直接DL: $BASE_URL"
          curl -fsSL --retry 3 --max-time 180 \
            -o "$FONT_DIR/NotoSansCJK-Bold.ttc" \
            "$BASE_URL/NotoSansCJK-Bold.ttc"
          curl -fsSL --retry 3 --max-time 180 \
            -o "$FONT_DIR/NotoSansCJK-Regular.ttc" \
            "$BASE_URL/NotoSansCJK-Regular.ttc"
          ls -la "$FONT_DIR"
          echo "LIGHT_FONT_DIR=$FONT_DIR" >> $GITHUB_ENV

      - name: ffmpeg セットアップ（プリインストール優先・apt-getフォールバック）
        run: |
          if command -v ffmpeg > /dev/null; then
            echo "ffmpeg プリインストール済み"
          else
            echo "ffmpeg 未検出 → apt-get で導入"
            sudo apt-get update && sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version | head -1

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: OAuth credentials 復元（Secretsからファイル化）
        run: |
          # credentials.json → scripts/credentials.json に書き出し
          echo "${{ secrets.LIGHT_GOOGLE_CREDENTIALS_B64 }}" | base64 -d > credentials.json
          mkdir -p _assets
          echo "${{ secrets.LIGHT_GOOGLE_TOKEN_B64 }}" | base64 -d > _assets/sheets_token.json
          echo "credentials.json サイズ: $(wc -c < credentials.json) bytes"
          echo "token.json サイズ: $(wc -c < _assets/sheets_token.json) bytes"

      - name: ライト記事配信実行
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          # Threads は独自API（graph.threads.net）を使う・占いと同じ Secrets を流用
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # LIGHT_FONT_DIR は前ステップで $GITHUB_ENV に動的設定済み
          # LIGHT_GOOGLE_CREDENTIALS / LIGHT_GOOGLE_TOKEN はデフォルトパス使用
          PYTHONIOENCODING: utf-8
        run: |
          ID_ARG=""
          if [ -n "${{ github.event.inputs.target_id }}" ]; then
            ID_ARG="--id ${{ github.event.inputs.target_id }}"
          fi
          MODE_FLAGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # 全schedule（19:00 / 19:30 / 20:00）で --skip-if-published 付与
            # 新規 → 通常公開 / 既存（前回失敗の残り）→ SNS だけ救済
            # 占いと同じ重複防止パターン
            MODE_FLAGS="--publish --skip-if-published"
          elif [ "${{ github.event.inputs.mode }}" = "publish" ]; then
            MODE_FLAGS="--publish"
          elif [ "${{ github.event.inputs.mode }}" = "publish-skip-if-published" ]; then
            MODE_FLAGS="--publish --skip-if-published"
          elif [ "${{ github.event.inputs.mode }}" = "draft" ]; then
            MODE_FLAGS="--draft"
          else
            MODE_FLAGS=""
          fi
          echo "実行コマンド: python publish_light_article.py $ID_ARG $MODE_FLAGS"
          python publish_light_article.py $ID_ARG $MODE_FLAGS

      - name: 生成物アーティファクトをアップロード（dry-run/draft時のみ）
        if: github.event.inputs.mode == 'dry-run' || github.event.inputs.mode == 'draft'
        uses: actions/upload-artifact@v4
        with:
          name: light-article-preview-${{ github.run_id }}
          path: |
            light_articles/scripts/_sample/*.png
            light_articles/scripts/_sample/*.mp4
          retention-days: 7
          if-no-files-found: warn

      - name: 失敗通知（Gmail）
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import os, smtplib
          from email.mime.text import MIMEText
          msg = MIMEText('ライト記事配信ワークフローが失敗しました。GitHub Actions のログを確認してください。\n\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}', 'plain', 'utf-8')
          msg['Subject'] = '[豊川ガイド] ライト記事配信失敗'
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = os.environ['GMAIL_USER']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          "
