name: SNSトークン健康診断（毎日・再発防止）

# 2026-06-16 新設。Threadsトークンが6/14に無監視のまま期限切れ→数日Threads投稿停止した件の再発防止。
# 毎日 META と Threads の両トークンを点検し、問題がある時だけ Gmail で警告（健全なら無音）。

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 09:00 JST（UTC 00:00）
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: uranai/scripts
    steps:
      - uses: actions/checkout@v4
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: ライブラリインストール
        run: pip install requests
      - name: トークン健康診断
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python token_health_check.py
