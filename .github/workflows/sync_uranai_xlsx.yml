name: 占いxlsx自動同期（Sheets→xlsx・本配信前）

on:
  schedule:
    - cron: '45 20 * * *'  # 05:45 JST（UTC 20:45）06:00本配信の15分前
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: uranai/scripts
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: uranai/scripts/requirements.txt

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: Sheets→xlsx 同期
        env:
          URANAI_SHEETS_URL: ${{ secrets.URANAI_SHEETS_URL }}
          URANAI_SHEETS_SECRET: ${{ secrets.URANAI_SHEETS_SECRET }}
        run: python sync_sheets_to_xlsx.py

      - name: 差分があれば commit & push
        run: |
          cd "$GITHUB_WORKSPACE"
          if git diff --quiet -- uranai/data/; then
            echo "差分なし（Sheets変更なし）→ commitしない"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add uranai/data/ラッキースポット管理.xlsx
            git add uranai/data/生まれ年グループ.xlsx
            git add uranai/data/町名グループ.xlsx
            git commit -m "chore: Sheets→xlsx自動同期 $(TZ=Asia/Tokyo date +%Y-%m-%d) [skip ci]"
            git push
            echo "同期commit完了（xlsxフォールバックを最新Sheetsの写しに更新）"
          fi

      - name: 失敗通知（Gmail）
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import os, smtplib
          from email.mime.text import MIMEText
          msg = MIMEText('占いxlsx自動同期が失敗しました。Sheets取得失敗の可能性。xlsxは前回の完全な状態を保持しているため本配信は継続可（フォールバックは前回同期データ）。\n\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}', 'plain', 'utf-8')
          msg['Subject'] = '[豊川ガイド] 占いxlsx同期失敗（配信は継続）'
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = os.environ['GMAIL_USER']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          "
